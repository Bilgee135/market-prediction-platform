<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --off-white: #F7F6F2;
      --ink: #111110;
      --muted: #6B6B65;
      --accent-green: #1A7A4A;
      --accent-red: #C0392B;
      --border: #E2E0D8;
      --ticker-bg: #EFEDE6;
      --card-bg: #ffffff;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--ink); min-height: 100vh; }

    /* ── NAVBAR ─────────────────────────────── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 64px; border-bottom: 1px solid var(--border);
      background: var(--off-white); position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 0.95rem; text-decoration: none; color: var(--ink); }
    .logo-bars { display: flex; align-items: flex-end; gap: 2.5px; height: 18px; }
    .logo-bars span { width: 4px; border-radius: 1px; background: var(--accent-green); }
    .logo-bars span:nth-child(1) { height: 8px; }
    .logo-bars span:nth-child(2) { height: 14px; }
    .logo-bars span:nth-child(3) { height: 10px; background: var(--accent-red); }
    .logo-bars span:nth-child(4) { height: 18px; }
    .logo-bars span:nth-child(5) { height: 12px; background: var(--accent-red); }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.875rem; font-weight: 400; letter-spacing: 0.02em; transition: color 0.2s; }
    .nav-links a:hover { color: var(--ink); }
    .nav-links a.active { color: var(--ink); font-weight: 500; }
    .nav-cta { background: var(--ink); color: var(--off-white) !important; padding: 8px 18px; border-radius: 6px; font-weight: 500 !important; transition: opacity 0.2s !important; }
    .nav-cta:hover { opacity: 0.75; }

    /* ── TICKER ─────────────────────────────── */
    .ticker-wrap { overflow: hidden; background: var(--ticker-bg); border-bottom: 1px solid var(--border); padding: 8px 0; }
    .ticker-track { display: flex; animation: ticker 30s linear infinite; width: max-content; }
    .ticker-item { display: flex; align-items: center; gap: 6px; padding: 0 28px; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.04em; border-right: 1px solid var(--border); white-space: nowrap; }
    .ticker-item .sym { color: var(--muted); font-weight: 300; }
    .ticker-item .val { color: var(--ink); }
    .ticker-item .chg.up { color: var(--accent-green); }
    .ticker-item .chg.dn { color: var(--accent-red); }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ── PAGE LAYOUT ────────────────────────── */
    .page {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: calc(100vh - 104px);
    }

    /* LEFT — sticky intro */
    .faq-left {
      padding: 64px 40px 64px 48px;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 64px;
      height: calc(100vh - 104px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s forwards;
    }
    .faq-left-top {}
    .page-eyebrow { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .faq-left h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 16px; }
    .faq-left p { font-size: 0.85rem; line-height: 1.75; color: var(--muted); font-weight: 300; margin-bottom: 32px; }

    /* Category filter */
    .cat-filters { display: flex; flex-direction: column; gap: 4px; }
    .cat-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .cat-btn {
      background: none; border: none; text-align: left;
      font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 400;
      color: var(--muted); cursor: pointer; padding: 8px 12px; border-radius: 6px;
      transition: background 0.15s, color 0.15s; display: flex; align-items: center; gap: 8px;
    }
    .cat-btn:hover { background: var(--border); color: var(--ink); }
    .cat-btn.active { background: var(--ink); color: var(--off-white); }
    .cat-count {
      margin-left: auto; font-size: 0.7rem; opacity: 0.5;
      background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 10px;
    }
    .cat-btn:not(.active) .cat-count { background: var(--border); color: var(--muted); opacity: 1; }

    .faq-left-bottom { font-size: 0.78rem; color: var(--muted); font-weight: 300; line-height: 1.6; }
    .faq-left-bottom a { color: var(--ink); text-decoration: underline; text-underline-offset: 3px; }

    /* RIGHT — accordion */
    .faq-right {
      padding: 48px 64px 80px 56px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    .faq-group { margin-bottom: 40px; }
    .faq-group-label {
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .faq-item {
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .faq-item:last-child { border-bottom: none; }

    .faq-question {
      width: 100%; background: none; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 400;
      color: var(--ink); text-align: left; cursor: pointer;
      padding: 18px 0; display: flex; align-items: center; justify-content: space-between;
      gap: 16px; transition: color 0.2s;
    }
    .faq-question:hover { color: var(--muted); }
    .faq-icon {
      width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--muted); flex-shrink: 0;
      transition: transform 0.25s ease, background 0.2s, border-color 0.2s;
    }
    .faq-item.open .faq-icon { transform: rotate(45deg); background: var(--ink); border-color: var(--ink); color: var(--off-white); }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .faq-item.open .faq-answer { max-height: 400px; }
    .faq-answer-inner {
      padding: 0 0 20px;
      font-size: 0.87rem; line-height: 1.8; color: var(--muted); font-weight: 300;
    }
    .faq-answer-inner strong { color: var(--ink); font-weight: 500; }
    .faq-answer-inner a { color: var(--ink); text-underline-offset: 3px; }

    /* Hidden group */
    .faq-group.hidden { display: none; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-bars"><span></span><span></span><span></span><span></span><span></span></div>
    Stock Market Prediction
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Overview</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="model_selection.html">Models</a></li>
    <li><a href="evaluations.html">Forecast</a></li>
    <li><a href="faq.html" class="nav-cta active">FAQ</a></li>
  </ul>
</nav>

<div class="ticker-wrap">
  <div class="ticker-track" id="ticker"></div>
</div>

<div class="page">

  <!-- LEFT SIDEBAR -->
  <div class="faq-left">
    <div class="faq-left-top">
      <div class="page-eyebrow">Help & Answers</div>
      <h1>FAQ</h1>
      <p>Common questions about the predictions, models, data, and how to use the platform.</p>

      <div class="cat-filters">
        <div class="cat-label">Filter by topic</div>
        <button class="cat-btn active" data-cat="all">All questions <span class="cat-count">15</span></button>
        <button class="cat-btn" data-cat="predictions">Predictions <span class="cat-count">4</span></button>
        <button class="cat-btn" data-cat="models">Models <span class="cat-count">4</span></button>
        <button class="cat-btn" data-cat="data">Data <span class="cat-count">4</span></button>
        <button class="cat-btn" data-cat="platform">Platform <span class="cat-count">3</span></button>
      </div>
    </div>
    <div class="faq-left-bottom">
      Still have questions?<br>
      View the <a href="about.html">About page</a> for project background and team information.
    </div>
  </div>

  <!-- RIGHT ACCORDION -->
  <div class="faq-right" id="faqRight">
    <!-- Filled by JS -->
  </div>

</div>

<script>
  // ── TICKER ────────────────────────────────────────────
  const tickers = [
    { sym: 'S&P 500', val: '5,642.30', chg: '+1.20%', up: true },
    { sym: 'AAPL',    val: '213.49',   chg: '+0.84%', up: true },
    { sym: 'MSFT',    val: '415.32',   chg: '-0.31%', up: false },
    { sym: 'AMZN',    val: '197.12',   chg: '+2.11%', up: true },
    { sym: 'NVDA',    val: '875.43',   chg: '+3.45%', up: true },
    { sym: 'GOOGL',   val: '173.88',   chg: '-0.62%', up: false },
    { sym: 'META',    val: '524.71',   chg: '+1.07%', up: true },
    { sym: 'TSLA',    val: '191.22',   chg: '-1.88%', up: false },
  ];
  document.getElementById('ticker').innerHTML =
    [...tickers, ...tickers].map(t =>
      `<span class="ticker-item"><span class="sym">${t.sym}</span><span class="val">${t.val}</span><span class="chg ${t.up?'up':'dn'}">${t.chg}</span></span>`
    ).join('');

  // ── FAQ DATA ──────────────────────────────────────────
  const groups = [
    {
      label: 'Predictions',
      cat: 'predictions',
      items: [
        {
          q: 'Can I use these predictions to make real investment decisions?',
          a: '<strong>No.</strong> This platform is built for academic and educational purposes only. Predictions are generated by models trained on historical data and cannot account for sudden market events, policy changes, or geopolitical developments. Do not rely on these forecasts for actual trading or investment.'
        },
        {
          q: 'How far ahead do the predictions go?',
          a: 'Each model generates weekly predictions covering a <strong>52-week forward horizon</strong> from May 2026 to May 2027. These are static predictions generated at the time of training, not live rolling forecasts.'
        },
        {
          q: 'What does directional accuracy mean?',
          a: 'Directional accuracy measures the percentage of weeks where the model correctly predicted whether the S&P 500 would go <strong>up or down</strong> compared to the previous week. A score above 50% means the model does better than a random guess. A score approaching 100% would suggest data leakage rather than a genuinely skilled model.'
        },
        {
          q: 'Why do predictions differ between models?',
          a: 'Each model learns differently. LSTM looks for long-range sequential patterns. XGBoost corrects errors incrementally. Random Forest averages across many decision trees. Because they use different mechanisms, they will disagree, especially during volatile periods. That disagreement is itself useful information.'
        },
      ]
    },
    {
      label: 'Models',
      cat: 'models',
      items: [
        {
          q: 'Which model is the most accurate?',
          a: 'Based on our evaluation, <strong>XGBoost</strong> achieved the best balance of directional accuracy (78%) and error rate (MAE: 33, RMSE: 51) on the test set. However, model rankings can shift depending on market conditions, so we recommend reviewing the full <a href="evaluations.html">evaluations page</a> before drawing conclusions.'
        },
        {
          q: 'Why is Linear Regression included if it performs worst?',
          a: 'Linear Regression serves as a <strong>baseline</strong>. Every other model must beat it to justify its added complexity. If an advanced model cannot outperform a simple straight-line fit, it likely means the feature engineering needs improvement, not that the model itself is bad.'
        },
        {
          q: 'What is the difference between LSTM and a standard neural network?',
          a: 'A standard neural network (ANN) treats each input independently. An <strong>LSTM</strong> maintains an internal memory state across time steps, meaning it can learn that price behaviour 10 weeks ago might still influence predictions today. That temporal memory is the key advantage for financial time series.'
        },
        {
          q: 'Are the models retrained on new data?',
          a: 'For the purpose of this academic project, models were trained on a fixed dataset up to January 2026 and are <strong>not retrained automatically</strong>. In a production version of this system, scheduled retraining would be triggered weekly to incorporate the latest market data.'
        },
      ]
    },
    {
      label: 'Data',
      cat: 'data',
      items: [
        {
          q: 'Where does the historical data come from?',
          a: 'Historical S&P 500 data from <strong>1926 to 2024</strong> is sourced from Wharton Research Data Services (WRDS). More recent data (2025 onwards) is fetched via the <strong>yfinance</strong> Python library using the Yahoo Finance API. Both sources have been confirmed for academic use.'
        },
        {
          q: 'What features do the models train on?',
          a: 'Beyond raw weekly OHLCV (open, high, low, close, volume) data, models are trained on engineered features including <strong>RSI, MACD, Bollinger Bands, EMA (12/26-week), rolling volatility</strong> over 5 and 30-week windows, and other technical indicators. These transform raw prices into signals that capture momentum, trend, and volatility.'
        },
        {
          q: 'How is the data split for training and testing?',
          a: 'The dataset is split <strong>chronologically</strong> and  never randomly. Using a random split on time series data would allow the model to see future prices during training, making accuracy figures meaningless. We use a 70% training, 15% validation, 15% test split, with the test set always being the most recent data.'
        },
        {
          q: 'What currencies are supported?',
          a: 'The S&P 500 is natively priced in <strong>USD</strong>. The platform offers display conversion to GBP, EUR, and JPY using a fixed conversion rate fetched at runtime via the forex-python library. These conversions are for display only and do not account for exchange rate fluctuations over the prediction horizon.'
        },
      ]
    },
    {
      label: 'Platform',
      cat: 'platform',
      items: [
        {
          q: 'What browsers does this platform support?',
          a: 'The platform is tested and fully functional on the latest versions of <strong>Chrome, Firefox, Edge, Safari, Brave, and Opera</strong> on desktop. Mobile and tablet layouts are also supported through responsive design.'
        },
        {
          q: 'Why does the chart show faded candles after the "NOW" line?',
          a: 'Candles rendered at reduced opacity to the right of the "NOW" divider represent <strong>model forecasts</strong>, not real historical data. The visual distinction is intentional as it prevents users from mistaking predicted values for actual market outcomes.'
        },
        {
          q: 'Can I compare multiple models on the same chart?',
          a: 'Not on the individual model pages because each page is dedicated to a single model\'s forecast. To compare models side by side, visit the <a href="evaluations.html">Model Evaluations</a> page, which shows accuracy metrics and performance charts for all six models together.'
        },
      ]
    },
  ];

  // ── RENDER ────────────────────────────────────────────
  function renderFAQ(activeCat) {
    const container = document.getElementById('faqRight');
    container.innerHTML = groups.map(g => {
      const show = activeCat === 'all' || activeCat === g.cat;
      return `
        <div class="faq-group ${show ? '' : 'hidden'}" data-cat="${g.cat}">
          <div class="faq-group-label">${g.label}</div>
          ${g.items.map((item, i) => `
            <div class="faq-item" data-index="${g.cat}-${i}">
              <button class="faq-question">
                ${item.q}
                <span class="faq-icon">+</span>
              </button>
              <div class="faq-answer">
                <div class="faq-answer-inner">${item.a}</div>
              </div>
            </div>`).join('')}
        </div>`;
    }).join('');

    // Accordion click handler
    container.querySelectorAll('.faq-question').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.faq-item');
        const isOpen = item.classList.contains('open');
        // Close all
        container.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
        // Toggle clicked
        if (!isOpen) item.classList.add('open');
      });
    });

    // Open first item in each visible group by default
    container.querySelectorAll('.faq-group:not(.hidden)').forEach(g => {
      g.querySelector('.faq-item')?.classList.add('open');
    });
  }

  // ── CATEGORY FILTER ───────────────────────────────────
  let activeCat = 'all';
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      renderFAQ(activeCat);
    });
  });

  renderFAQ('all');
</script>
</body>
</html>
